<!-- ===== 开场警告弹窗 ===== -->
<div id="warningModal" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-family: 'Microsoft YaHei', sans-serif;
">
  <div style="
    background: white;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 80%;
    border: 2px solid #ddd;
  ">
    <h2 style="margin-top: 0; color: #333;">⚠️ 心理调查前置警告</h2>
    <p style="font-size: 16px; color: #555; line-height: 1.6;">
      本问卷包含<strong>微恐 / 窥视 / 强制互动</strong>元素，
      旨在营造沉浸式心理体验。
      <strong style="color: #d9534f;">如有心理不适、易受惊吓或情绪敏感，请立即关闭页面。</strong>
    
    <button id="confirmStart" style="
      margin-top: 20px;
      padding: 10px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    " onmouseover="this.style.background='#555'" onmouseout="this.style.background='#333'">
      我已了解，开始答题
    </button>
  </div>
</div>
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>心理与生理状态评估</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="overlay"></div>

<div class="container" id="survey">
  <h1 id="title">心理与生理状态评估</h1>
  <p id="progress">第 <span id="current">1</span> 题 / 共 45 题</p>
  <p id="question"></p>
  <div id="options"></div>
</div>

<!-- 留言 -->
<div id="letter" class="hidden">
  <h2>检测到一封未读留言</h2>
  <p>是否查看？</p>
  <button onclick="rejectLetter()">不是</button>
  <button onclick="acceptLetter()">是</button>
</div>

<!-- 日记 -->
<div id="diary" class="hidden">
  <div id="pages"></div>
</div>

<script src="script.js"></script>
</body>
</html>
